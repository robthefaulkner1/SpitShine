# Netlify configuration — Spit Shine San Antonio
#
# The site is plain static HTML/CSS/JS that lives in the repo root. The
# build command regenerates the pages from build.py + pages_content.py so
# the deployed site always matches the source (build.py uses only the
# Python standard library — no pip install needed).

[build]
  publish = "."
  command = "python3 build.py"

[build.environment]
  PYTHON_VERSION = "3.11"

# Long-cache the fingerprint-stable assets (logo, favicon).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
